$kind: http-request
url: "{{token_url}}"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    grant_type: authorization_code
    code: "{{auth_code}}"
    redirect_uri: "{{redirect_uri}}"
    client_id: "{{client_id}}"
    client_secret: "{{client_secret}}"
order: 1000
