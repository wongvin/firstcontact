<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Code Transcript Viewer</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 1rem;
      box-sizing: border-box;
      gap: 0.75rem;
    }
    a.home-link {
      position: fixed;
      top: 1rem;
      left: 1rem;
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      font-size: 0.9rem;
      padding: 0.4rem 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 0.4rem;
      background: rgba(255, 255, 255, 0.08);
      z-index: 10;
    }
    a.home-link:hover { color: white; }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 3.5rem;
      min-height: 0;
    }
    .output-card {
      flex: 1;
      min-height: 0;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 0.75rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 0.75rem 1rem;
      overflow-y: auto;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .prompt-line {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: pre-wrap;
      margin-bottom: 0.5rem;
      background: rgba(255, 255, 255, 0.88);
      color: #1a1a2e;
      font-weight: 700;
      padding: 0.4rem 0.7rem;
      border-radius: 0.4rem;
    }
    .response-body { white-space: pre-wrap; font-weight: 300; }
    .response-body .block-separator { display: none; }
    .response-body > :first-child { margin-top: 0.5rem; }
    .response-body p { margin: 0.5rem 0; white-space: pre-wrap; }
    .response-body h1,
    .response-body h2,
    .response-body h3,
    .response-body h4,
    .response-body h5,
    .response-body h6 { margin: 0.6rem 0 0.3rem; font-weight: 700; }
    .response-body ul,
    .response-body ol { padding-left: 1.25rem; margin: 0.25rem 0; }
    .response-body li { margin: 0.1rem 0; }
    .response-body pre {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
      overflow-x: auto;
      margin: 0.5rem 0;
      white-space: pre;
      font-size: 0.9rem;
    }
    .response-body code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.9rem;
      font-weight: 700;
    }
    .response-body pre code { font-family: inherit; font-size: inherit; }
    .response-body a {
      color: #cfe0ff;
      background: rgba(0, 0, 0, 0.32);
      border-radius: 4px;
      padding: 0.05rem 0.3rem;
      text-decoration: underline;
      text-decoration-color: rgba(207, 224, 255, 0.5);
    }
    .response-body a:hover {
      background: rgba(0, 0, 0, 0.5);
      text-decoration-color: #cfe0ff;
    }
    .response-body a.plan-path { text-decoration: none; }
    .response-body a.plan-path code { color: inherit; }
    .response-body a.plan-path:hover code { color: #ffffff; }
    .response-body strong { font-weight: 700; }
    .response-body .cursor {
      background: rgba(0, 0, 0, 0.55);
      color: inherit;
      border-radius: 1px;
      animation: cursor-blink 1s steps(2, start) infinite;
    }
    @keyframes cursor-blink { to { background: transparent; } }
    .response-body table {
      border-collapse: collapse;
      margin: 0.5rem 0;
      font-size: 0.85rem;
    }
    .response-body th,
    .response-body td {
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 0.3rem 0.6rem;
      text-align: left;
      vertical-align: top;
    }
    .response-body th {
      background: rgba(255, 255, 255, 0.08);
      font-weight: 600;
    }
    .bottom-bar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 1rem;
    }
    .search-bar {
      justify-self: start;
      min-width: 20ch;
      min-height: 1.4em;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: rgba(255, 255, 255, 0.88);
      color: #1a1a2e;
      padding: 0.2rem 0.55rem;
      border-radius: 0.3rem;
      font-weight: 700;
      white-space: pre;
      text-align: left;
    }
    .search-bar.empty { visibility: hidden; }
    .search-bar.error {
      background: rgba(140, 20, 20, 0.9);
      color: #ffffff;
    }
    .help {
      text-align: center;
      font-size: 0.8rem;
      opacity: 0.7;
      letter-spacing: 0.04em;
    }
    .muted { opacity: 0.75; font-size: 0.95rem; }
    .error { color: #ffd6d6; }
  </style>
</head>
<body>
  <a class="home-link" href="index.html">← Home</a>

  <main>
    <article class="output-card" id="output-card" aria-live="polite">
      <div class="prompt-line" id="prompt-line"></div>
      <div class="response-body" id="response-body">Loading…</div>
    </article>
    <div class="bottom-bar">
      <div class="search-bar empty" id="search-bar" aria-live="polite"></div>
      <div class="help">↑↓ prompts &nbsp;·&nbsp; ←→ days &nbsp;·&nbsp; hjklHMLG/nN vim keybind</div>
    </div>
  </main>

  <script>
    const BACKEND_URL = "http://localhost:8001";
    const ALLOWED_LINK_SCHEME = /^(https?:|mailto:)/i;
    // Plan-file detection inside inline `code` spans: any absolute path under
    // `<home>/.claude/plans/<name>.md` becomes a clickable vscode://file/<path>
    // link so the user can open the plan in VS Code. Scoped narrowly to plan
    // files only — other inline code (filenames in general, identifiers, etc.)
    // stays as plain <code>. Optional trailing `:LINE` or `:LINE:COL` accepted.
    const PLAN_PATH_RE = /^\/.+\/\.claude\/plans\/[\w.-]+\.md(?::\d+(?::\d+)?)?$/;

    const promptLineEl   = document.getElementById('prompt-line');
    const responseBodyEl = document.getElementById('response-body');
    const searchBarEl    = document.getElementById('search-bar');

    let prompts = [];
    let days = [];
    let currentIndex = 0;
    const lastIndexByDay = {};       // last viewed prompt index within each day
    const cursorByPromptIndex = {};  // remembered cursor position per prompt index
    let cursor = { line: 1, col: 1 };// current cursor source-line/col (1-indexed)

    // --- localStorage persistence for the two memory dicts (#68) --------------
    // Bump the `:v1:` to `:v2:` to invalidate older entries (hydration ignores
    // keys whose prefix doesn't match, so v2 silently starts fresh).
    const STORAGE_PREFIX = 'firstcontact:transcripts-viewer:v1:';
    const DAY_KEY = STORAGE_PREFIX + 'lastIndexByDay';
    const CURSOR_KEY = STORAGE_PREFIX + 'cursorByPromptIndex';
    const DAY_CAP = 100;
    const CURSOR_CAP = 500;

    function safeRead(key) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) return null;
        return parsed;
      } catch (e) {
        return null;
      }
    }
    function safeWrite(key, obj) {
      try {
        localStorage.setItem(key, JSON.stringify(obj));
      } catch (e) {
        // quota exceeded / private browsing — degrade silently to in-memory only
      }
    }
    function evictTo(obj, cap) {
      const keys = Object.keys(obj);
      if (keys.length <= cap) return;
      for (let i = 0; i < keys.length - cap; i++) {
        delete obj[keys[i]];
      }
    }
    function isValidDayDict(obj) {
      for (const v of Object.values(obj)) {
        if (!Number.isInteger(v) || v < 0) return false;
      }
      return true;
    }
    function isValidCursorDict(obj) {
      for (const v of Object.values(obj)) {
        if (!v || typeof v !== 'object') return false;
        if (!Number.isInteger(v.line) || !Number.isInteger(v.col)) return false;
      }
      return true;
    }
    function hydrateMemory() {
      const day = safeRead(DAY_KEY);
      if (day && isValidDayDict(day)) Object.assign(lastIndexByDay, day);
      const cur = safeRead(CURSOR_KEY);
      if (cur && isValidCursorDict(cur)) Object.assign(cursorByPromptIndex, cur);
    }
    function persistDay() {
      evictTo(lastIndexByDay, DAY_CAP);
      safeWrite(DAY_KEY, lastIndexByDay);
    }
    function persistCursor() {
      evictTo(cursorByPromptIndex, CURSOR_CAP);
      safeWrite(CURSOR_KEY, cursorByPromptIndex);
    }
    // --- end persistence ------------------------------------------------------

    let numberPrefix = '';           // accumulates digits for <num>G
    let searchMode = false;
    let searchString = '';
    let lastSearch = '';
    let errorClearTimer = null;

    function setMessage(text, className) {
      responseBodyEl.replaceChildren();
      responseBodyEl.textContent = text;
      responseBodyEl.className = 'response-body' + (className ? ' ' + className : '');
      promptLineEl.replaceChildren();
    }

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return iso;
      const pad = (n) => String(n).padStart(2, '0');
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
    }

    function formatTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '';
      const pad = (n) => String(n).padStart(2, '0');
      let h = d.getHours();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return pad(h) + ':' + pad(d.getMinutes()) + ' ' + ampm;
    }

    // Builds the prompt-line content as DOM nodes so the time portion can carry
    // its own background tint via a <span class="time-chip">. Everything else
    // is plain text via createTextNode — no markdown rendering on prompt content.
    function buildPromptLine(dateStr, timeStr, suffix) {
      promptLineEl.replaceChildren();
      promptLineEl.appendChild(document.createTextNode(dateStr + ' '));
      const chip = document.createElement('span');
      chip.className = 'time-chip';
      chip.textContent = timeStr;
      promptLineEl.appendChild(chip);
      promptLineEl.appendChild(document.createTextNode(suffix));
    }

    // Walks back from a trailing `?` to the previous sentence terminator
    // (`.`, `!`, `?`, or `\n`) and returns just that fragment. Used to surface
    // the Claude question that prompted the current user reply.
    function extractTrailingQuestion(text) {
      if (!text) return null;
      const trimmed = text.replace(/\s+$/, '');
      if (!trimmed.endsWith('?')) return null;
      let start = 0;
      for (let i = trimmed.length - 2; i >= 0; i--) {
        const c = trimmed[i];
        if (c === '.' || c === '!' || c === '?' || c === '\n') { start = i + 1; break; }
      }
      return trimmed.slice(start).trimStart();
    }

    // ---- Markdown renderer ---------------------------------------------------
    // Hand-rolled to honour web/CLAUDE.md: no external dependencies, no
    // `innerHTML` on API strings. All DOM is built via createElement +
    // textContent. The only attribute set from API data is anchor `href`,
    // and only after scheme validation against ALLOWED_LINK_SCHEME.
    //
    // In scope: fenced code, inline code, links, bare URLs, headings,
    // unordered/ordered lists (flat), **bold**, *italic*, _italic_,
    // GFM tables (`| h | h |` + `|---|---|` separator + body rows).
    // Out of scope: nested lists, block quotes, horizontal rules,
    // images, strikethrough, reference links, inline HTML.

    function renderMarkdownInto(root, mdText) {
      if (!mdText) return;
      const blocks = parseBlocks(mdText);
      for (let i = 0; i < blocks.length; i++) {
        // Insert a hidden block-separator carrying a `\n` between siblings.
        // The `\n` is in textContent (so j/k cursor counting still treats
        // each block boundary as a line break) but doesn't render visually
        // (the wrapping span has display: none) — keeps inter-block spacing
        // tight, especially for list items and code blocks.
        if (i > 0) root.appendChild(createBlockSeparator());
        renderBlock(root, blocks[i]);
      }
    }

    function createBlockSeparator() {
      const span = document.createElement('span');
      span.className = 'block-separator';
      span.textContent = '\n';
      return span;
    }

    function parseBlocks(text) {
      const lines = text.split('\n');
      const blocks = [];
      let i = 0;
      while (i < lines.length) {
        const blockStart = i + 1;   // 1-indexed source line where this block begins
        const line = lines[i];
        const fence = line.match(/^```(\w*)\s*$/);
        if (fence) {
          const bodyLines = [];
          i++;
          while (i < lines.length && !/^```\s*$/.test(lines[i])) {
            bodyLines.push(lines[i]);
            i++;
          }
          i++;  // skip closing fence (or EOF)
          blocks.push({
            type: 'code', body: bodyLines.join('\n'),
            sourceLineStart: blockStart, sourceLineEnd: i,
          });
          continue;
        }
        if (line.trim() === '') { i++; continue; }
        const heading = line.match(/^(#{1,6})\s+(.*)$/);
        if (heading) {
          blocks.push({
            type: 'heading', level: heading[1].length, text: heading[2],
            sourceLineStart: blockStart, sourceLineEnd: blockStart,
          });
          i++;
          continue;
        }
        // GFM table: header `| col | col |`, then separator `|---|---|`
        // (cells may contain `:` for alignment, which we accept but ignore),
        // then body rows. Recognised only when the line *after* a pipe header
        // is a valid separator — otherwise the line is a paragraph.
        if (line.includes('|') && i + 1 < lines.length && isTableSeparator(lines[i + 1])) {
          const headerLine = blockStart;       // header row source line
          const header = parseTableRow(line);
          i += 2;  // skip header + separator (separator at headerLine+1)
          const rows = [];
          const rowSourceLines = [];
          while (i < lines.length && lines[i].includes('|') && lines[i].trim() !== '') {
            rows.push(parseTableRow(lines[i]));
            rowSourceLines.push(i + 1);
            i++;
          }
          blocks.push({
            type: 'table', header, rows,
            headerSourceLine: headerLine,
            separatorSourceLine: headerLine + 1,
            rowSourceLines,
            sourceLineStart: headerLine,
            sourceLineEnd: rowSourceLines.length ? rowSourceLines[rowSourceLines.length - 1] : headerLine + 1,
          });
          continue;
        }
        const ul = /^[-*]\s+(.*)$/;
        const ol = /^\d+\.\s+(.*)$/;
        if (ul.test(line) || ol.test(line)) {
          const re = ul.test(line) ? ul : ol;
          const items = [];
          const itemSourceLines = [];
          while (i < lines.length && re.test(lines[i])) {
            items.push(lines[i].match(re)[1]);
            itemSourceLines.push(i + 1);
            i++;
          }
          blocks.push({
            type: re === ul ? 'ul' : 'ol', items, itemSourceLines,
            sourceLineStart: itemSourceLines[0],
            sourceLineEnd: itemSourceLines[itemSourceLines.length - 1],
          });
          continue;
        }
        const paraLines = [];
        const paraStart = blockStart;
        while (i < lines.length && lines[i].trim() !== '' &&
               !/^```/.test(lines[i]) &&
               !/^#{1,6}\s/.test(lines[i]) &&
               !ul.test(lines[i]) && !ol.test(lines[i]) &&
               !(lines[i].includes('|') && i + 1 < lines.length && isTableSeparator(lines[i + 1]))) {
          paraLines.push(lines[i]);
          i++;
        }
        if (paraLines.length) {
          blocks.push({
            type: 'p', text: paraLines.join('\n'),
            sourceLineStart: paraStart, sourceLineEnd: paraStart + paraLines.length - 1,
          });
        }
      }
      return blocks;
    }

    function isTableSeparator(line) {
      // Strip leading/trailing pipes + whitespace, split on `|`, each cell must
      // match `-+`, optionally bracketed by `:` (alignment), nothing else.
      const trimmed = line.trim();
      if (!trimmed.includes('|') || !trimmed.includes('-')) return false;
      const inner = trimmed.replace(/^\|/, '').replace(/\|$/, '');
      const cells = inner.split('|');
      if (cells.length === 0) return false;
      return cells.every(c => /^\s*:?-+:?\s*$/.test(c));
    }

    function parseTableRow(line) {
      const trimmed = line.trim().replace(/^\|/, '').replace(/\|$/, '');
      return trimmed.split('|').map(c => c.trim());
    }

    // Helper: tag a DOM element with source-line attrs for cursor mapping.
    function tagSource(el, start, end) {
      el.dataset.sourceLineStart = String(start);
      el.dataset.sourceLineEnd = String(end);
    }

    function renderBlock(parent, block) {
      if (block.type === 'code') {
        const pre = document.createElement('pre');
        const code = document.createElement('code');
        code.textContent = block.body;
        pre.appendChild(code);
        tagSource(pre, block.sourceLineStart, block.sourceLineEnd);
        parent.appendChild(pre);
        return;
      }
      if (block.type === 'heading') {
        const h = document.createElement('h' + block.level);
        renderInlineInto(h, block.text);
        tagSource(h, block.sourceLineStart, block.sourceLineEnd);
        parent.appendChild(h);
        return;
      }
      if (block.type === 'ul' || block.type === 'ol') {
        const list = document.createElement(block.type);
        for (let idx = 0; idx < block.items.length; idx++) {
          if (idx > 0) list.appendChild(createBlockSeparator());
          const li = document.createElement('li');
          renderInlineInto(li, block.items[idx]);
          tagSource(li, block.itemSourceLines[idx], block.itemSourceLines[idx]);
          list.appendChild(li);
        }
        tagSource(list, block.sourceLineStart, block.sourceLineEnd);
        parent.appendChild(list);
        return;
      }
      if (block.type === 'table') {
        const table = document.createElement('table');
        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');
        for (const cell of block.header) {
          const th = document.createElement('th');
          renderInlineInto(th, cell);
          headerRow.appendChild(th);
        }
        tagSource(headerRow, block.headerSourceLine, block.headerSourceLine);
        thead.appendChild(headerRow);
        table.appendChild(thead);
        const tbody = document.createElement('tbody');
        for (let r = 0; r < block.rows.length; r++) {
          const tr = document.createElement('tr');
          for (const cell of block.rows[r]) {
            const td = document.createElement('td');
            renderInlineInto(td, cell);
            tr.appendChild(td);
          }
          tagSource(tr, block.rowSourceLines[r], block.rowSourceLines[r]);
          tbody.appendChild(tr);
        }
        table.appendChild(tbody);
        tagSource(table, block.sourceLineStart, block.sourceLineEnd);
        parent.appendChild(table);
        return;
      }
      if (block.type === 'p') {
        const p = document.createElement('p');
        renderInlineInto(p, block.text);
        tagSource(p, block.sourceLineStart, block.sourceLineEnd);
        parent.appendChild(p);
      }
    }

    // ---- Cursor placement ---------------------------------------------------
    // Cursor coordinates are 1-indexed (line, col) in the RENDERED text of
    // #response-body (markdown-rendered output, NOT the raw source). This is
    // what the user sees on screen, so search results and h/j/k/l navigation
    // both operate in the same visual coordinate space.

    function currentRenderedText() {
      // Caller must ensure no cursor span is in the DOM (or accept that the
      // cursor's own character/placeholder will be included).
      return responseBodyEl.textContent;
    }

    function totalLines() {
      return currentRenderedText().split('\n').length;
    }

    function lineLength(line) {
      const lines = currentRenderedText().split('\n');
      if (line < 1 || line > lines.length) return 0;
      return lines[line - 1].length;
    }

    function removeCursorSpan() {
      const old = responseBodyEl.querySelector('.cursor');
      if (!old || !old.parentNode) return;
      const parent = old.parentNode;
      if (old.dataset.placeholder === '1') {
        // The span's content (a space) was synthetic — don't restore it.
        parent.removeChild(old);
      } else {
        // Put the wrapped character back into the DOM as a plain text node.
        const tn = document.createTextNode(old.textContent);
        parent.replaceChild(tn, old);
      }
      // Merge adjacent text nodes so subsequent placements don't accumulate
      // fragmentation from repeated splitText calls.
      parent.normalize();
    }

    function placeCursorAt(line, col) {
      removeCursorSpan();
      if (!prompts.length) return;
      const text = currentRenderedText();
      if (!text) return;

      const lines = text.split('\n');
      // Clamp line/col into the rendered text's range.
      let L = Math.max(1, Math.min(lines.length, line));
      let llen = lines[L - 1].length;
      let C = Math.max(1, Math.min(Math.max(1, llen), col | 0));

      // Compute the target character offset in rendered text.
      let targetOffset = 0;
      for (let i = 0; i < L - 1; i++) targetOffset += lines[i].length + 1;  // +1 for the `\n`
      targetOffset += C - 1;

      // Walk #response-body text nodes in DOM order, sum lengths until the
      // running total exceeds the target. Insert the cursor at the local
      // offset within the spanning text node.
      const walker = document.createTreeWalker(responseBodyEl, NodeFilter.SHOW_TEXT, null);
      let walked = 0;
      let lastNode = null;
      while (walker.nextNode()) {
        const node = walker.currentNode;
        if (node.parentNode && node.parentNode.classList && node.parentNode.classList.contains('cursor')) continue;
        lastNode = node;
        const len = node.nodeValue.length;
        if (walked + len > targetOffset) {
          insertCursorAtTextOffset(node, targetOffset - walked);
          cursor = { line: L, col: C };
          scrollCursorIntoView();
          return;
        }
        walked += len;
      }
      // Target offset is at the very end of the rendered text — anchor cursor
      // at end of the last text node (or fall back to the body element).
      if (lastNode) {
        insertCursorAtTextOffset(lastNode, lastNode.nodeValue.length);
      } else {
        responseBodyEl.appendChild(makeCursorSpan(' ', true));
      }
      cursor = { line: L, col: C };
      scrollCursorIntoView();
    }

    function makeCursorSpan(charContent, isPlaceholder) {
      const c = document.createElement('span');
      c.className = 'cursor';
      c.textContent = charContent;
      if (isPlaceholder) c.dataset.placeholder = '1';
      return c;
    }

    // Wraps the single character at `offset` in a cursor span (so the
    // character stays visible with a darker tint behind it). If `offset` is
    // past the end of the text node, or lands on a `\n`, insert a span with a
    // non-breaking space so the cursor block has visible width.
    function insertCursorAtTextOffset(textNode, offset) {
      const text = textNode.nodeValue;
      if (offset >= text.length) {
        const span = makeCursorSpan(' ', true);
        textNode.parentNode.insertBefore(span, textNode.nextSibling);
        return;
      }
      if (text[offset] === '\n') {
        const span = makeCursorSpan(' ', true);
        const parentEl = textNode.parentNode;
        // If the `\n` is inside a hidden block-separator span, the cursor
        // would render invisibly. Anchor it just before the separator span so
        // it appears in the document flow.
        if (parentEl && parentEl.classList && parentEl.classList.contains('block-separator')) {
          parentEl.parentNode.insertBefore(span, parentEl);
          return;
        }
        const after = textNode.splitText(offset);
        parentEl.insertBefore(span, after);
        return;
      }
      // Split off the prefix (offset > 0), then peel a single-char node off
      // the remainder and replace it with a cursor span containing that char.
      const remainder = offset === 0 ? textNode : textNode.splitText(offset);
      remainder.splitText(1);   // sets remainder.length === 1
      const span = makeCursorSpan(remainder.nodeValue, false);
      remainder.parentNode.replaceChild(span, remainder);
    }

    function scrollCursorIntoView() {
      // When the cursor lands on the first rendered line, scroll the output
      // card to scrollTop = 0 so the prompt-line above the response body
      // becomes visible again. Otherwise just nudge the cursor into view via
      // the nearest-scroll heuristic.
      if (cursor && cursor.line === 1) {
        const card = document.getElementById('output-card');
        if (card) card.scrollTop = 0;
        return;
      }
      const el = responseBodyEl.querySelector('.cursor');
      if (el && el.scrollIntoView) el.scrollIntoView({ block: 'nearest', inline: 'nearest' });
    }

    function moveCursor(dLine, dCol) {
      const total = totalLines();
      const N = prompts.length;
      const curLineLen = lineLength(cursor.line);
      const curMaxCol = Math.max(1, curLineLen);

      // Cross-response motion at extreme cursor positions (issue #50):
      //   `j` at last line     → next response, line 1, col preserved
      //   `k` at first line    → prev response, last line, col preserved
      //   `h` at (1, 1)        → prev response, last line, last col
      //   `l` at (last, lastCol) → next response, line 1, col 1
      // Col is "preserved" but clamped to the new line's length where shorter.

      if (dLine === +1 && cursor.line === total && currentIndex + 1 < N) {
        const desiredCol = cursor.col;
        render(currentIndex + 1);
        const newLLen = lineLength(1);
        placeCursorAt(1, Math.max(1, Math.min(Math.max(1, newLLen), desiredCol)));
        return;
      }
      if (dLine === -1 && cursor.line === 1 && currentIndex - 1 >= 0) {
        const desiredCol = cursor.col;
        render(currentIndex - 1);
        const newTotal = totalLines();
        const newLLen = lineLength(newTotal);
        placeCursorAt(newTotal, Math.max(1, Math.min(Math.max(1, newLLen), desiredCol)));
        return;
      }
      if (dCol === -1 && cursor.line === 1 && cursor.col === 1 && currentIndex - 1 >= 0) {
        render(currentIndex - 1);
        const newTotal = totalLines();
        const newLLen = lineLength(newTotal);
        placeCursorAt(newTotal, Math.max(1, newLLen));
        return;
      }
      if (dCol === +1 && cursor.line === total && cursor.col === curMaxCol && currentIndex + 1 < N) {
        render(currentIndex + 1);
        placeCursorAt(1, 1);
        return;
      }

      // Intra-response motion (existing behavior).
      let L = cursor.line + dLine;
      let C = cursor.col + dCol;
      if (L < 1) L = 1;
      if (L > total) L = total;
      const llen = lineLength(L);
      const maxCol = Math.max(1, llen);
      if (C < 1) C = 1;
      if (C > maxCol) C = maxCol;
      placeCursorAt(L, C);
    }

    function moveCursorAbs(line, col) {
      placeCursorAt(line, col);
    }

    // Returns the DOM bounding rect for the start of rendered line `line`, or
    // null if the line isn't reachable in the DOM. Uses a Range over one
    // character so no DOM mutation occurs. Skips text nodes inside the cursor
    // span so the cursor's own position doesn't perturb the measurement.
    function rectForLineStart(line) {
      const text = currentRenderedText();
      const lines = text.split('\n');
      if (line < 1 || line > lines.length) return null;
      let off = 0;
      for (let i = 0; i < line - 1; i++) off += lines[i].length + 1;
      const walker = document.createTreeWalker(responseBodyEl, NodeFilter.SHOW_TEXT, null);
      let walked = 0;
      while (walker.nextNode()) {
        const node = walker.currentNode;
        if (node.parentNode && node.parentNode.classList && node.parentNode.classList.contains('cursor')) continue;
        const len = node.nodeValue.length;
        if (walked + len > off) {
          const local = off - walked;
          const r = document.createRange();
          r.setStart(node, local);
          r.setEnd(node, Math.min(node.nodeValue.length, local + 1));
          return r.getBoundingClientRect();
        }
        walked += len;
      }
      return null;
    }

    // Finds the top/middle/bottom rendered lines currently visible inside the
    // #output-card viewport. "Top" = first line whose top is at or below the
    // viewport top; "Bottom" = last line whose bottom is at or above the
    // viewport bottom; "Middle" = line whose vertical center is closest to the
    // viewport midpoint. Long content with lines outside the viewport on both
    // sides gives sensible H/M/L candidates; very short content where the
    // entire response fits inside the viewport falls back to first / mid / last.
    function findVisibleLineRange() {
      const card = document.getElementById('output-card');
      if (!card) return null;
      const cardRect = card.getBoundingClientRect();
      const vTop = cardRect.top;
      const vBot = cardRect.bottom;
      const vMid = (vTop + vBot) / 2;
      const total = totalLines();
      if (total < 1) return null;

      let top = -1, bot = -1, mid = -1;
      let bestMidDist = Infinity;
      for (let L = 1; L <= total; L++) {
        const r = rectForLineStart(L);
        if (!r) continue;
        if (r.top >= vTop && r.bottom <= vBot) {
          if (top === -1) top = L;
          bot = L;
        }
        const center = (r.top + r.bottom) / 2;
        const dist = Math.abs(center - vMid);
        if (dist < bestMidDist) {
          bestMidDist = dist;
          mid = L;
        }
      }
      if (top === -1) top = 1;
      if (bot === -1) bot = total;
      if (mid === -1) mid = Math.max(1, Math.min(total, Math.ceil((top + bot) / 2)));
      return { top, mid, bot };
    }
    // ---- end cursor placement ----------------------------------------------

    // ---- Search ------------------------------------------------------------
    // Search scope: response_text across ALL prompts in the global timeline.
    // user_text is NOT searched. Modal: after `/`, all keys are captured into
    // the search string until Enter (execute) or Escape (cancel). VIM keys
    // (h/j/k/l/n/N/G) become literal text while in search mode.

    function setSearchBar(text, error) {
      searchBarEl.textContent = text;
      if (error) {
        searchBarEl.classList.add('error');
        searchBarEl.classList.remove('empty');
      } else if (text === '') {
        searchBarEl.classList.add('empty');
        searchBarEl.classList.remove('error');
      } else {
        searchBarEl.classList.remove('empty', 'error');
      }
    }

    function enterSearchMode() {
      if (errorClearTimer) { clearTimeout(errorClearTimer); errorClearTimer = null; }
      searchMode = true;
      searchString = '';
      setSearchBar('/', false);
    }

    function exitSearchMode(clearBar) {
      searchMode = false;
      searchString = '';
      if (clearBar) setSearchBar('', false);
    }

    function handleSearchKey(event) {
      event.preventDefault();
      const key = event.key;
      if (key === 'Escape') { exitSearchMode(true); return; }
      if (key === 'Enter')  { const s = searchString; exitSearchMode(false); executeSearch(s); return; }
      if (key === 'Backspace') {
        if (searchString.length > 0) {
          searchString = searchString.slice(0, -1);
          setSearchBar('/' + searchString, false);
        } else {
          exitSearchMode(true);
        }
        return;
      }
      // Printable single character.
      if (key.length === 1) {
        searchString += key;
        setSearchBar('/' + searchString, false);
      }
    }

    // Translate a character offset within response_text to (line, col).
    function offsetToLineCol(text, offset) {
      let line = 1;
      let lastNl = -1;
      for (let i = 0; i < offset; i++) {
        if (text[i] === '\n') { line++; lastNl = i; }
      }
      const col = offset - lastNl;   // (offset - (lastNl+1)) + 1 = offset - lastNl
      return { line, col };
    }

    // Returns the rendered text content for the response of prompt `idx`.
    // For the currently displayed prompt, reads `responseBodyEl.textContent`
    // directly. For other prompts, renders the markdown into an off-DOM
    // container and returns its textContent. This is what search operates on,
    // so a match's offset is in rendered-text coordinates (the same space the
    // user sees on screen and the same space the cursor lives in).
    function renderedTextFor(idx) {
      if (idx === currentIndex) {
        // Live DOM may currently contain the cursor span; its content is
        // either a real character (already in source) or a placeholder space.
        // Real-character case is harmless (the char would be in textContent
        // either way). Placeholder case adds a single fake space — accept it
        // as a tiny imprecision rather than DOM-mutating to compute.
        return responseBodyEl.textContent;
      }
      const temp = document.createElement('div');
      renderMarkdownInto(temp, prompts[idx].response_text || '');
      return temp.textContent;
    }

    // Search the global timeline for `s` in RENDERED text. Direction +1 =
    // forward (n / first execute), -1 = backward (N). Returns
    // { promptIdx, offset } where offset is in rendered-text coordinates, or
    // null if not found anywhere in the timeline.
    function findMatchGlobal(s, direction) {
      if (!s || !prompts.length) return null;
      const N = prompts.length;
      const startIdx = currentIndex;
      const curText = renderedTextFor(startIdx);
      const curLines = curText.split('\n');
      let cursorOffset = 0;
      for (let L = 0; L < cursor.line - 1; L++) cursorOffset += curLines[L].length + 1;
      cursorOffset += (cursor.col - 1);
      if (cursorOffset > curText.length) cursorOffset = curText.length;

      if (direction > 0) {
        const hitCur = curText.indexOf(s, cursorOffset + 1);
        if (hitCur !== -1) return { promptIdx: startIdx, offset: hitCur };
        for (let step = 1; step <= N; step++) {
          const idx = (startIdx + step) % N;
          if (idx === startIdx) break;
          const hit = renderedTextFor(idx).indexOf(s);
          if (hit !== -1) return { promptIdx: idx, offset: hit };
        }
        const wrapHit = curText.indexOf(s);
        if (wrapHit !== -1 && wrapHit <= cursorOffset) return { promptIdx: startIdx, offset: wrapHit };
        return null;
      } else {
        const upper = Math.max(0, cursorOffset - 1);
        const hitCur = curText.lastIndexOf(s, upper - 1);
        if (hitCur !== -1) return { promptIdx: startIdx, offset: hitCur };
        for (let step = 1; step <= N; step++) {
          const idx = (startIdx - step + N) % N;
          if (idx === startIdx) break;
          const hit = renderedTextFor(idx).lastIndexOf(s);
          if (hit !== -1) return { promptIdx: idx, offset: hit };
        }
        const wrapHit = curText.lastIndexOf(s);
        if (wrapHit !== -1 && wrapHit >= cursorOffset) return { promptIdx: startIdx, offset: wrapHit };
        return null;
      }
    }

    function applyMatch(s, match) {
      lastSearch = s;
      if (match.promptIdx !== currentIndex) {
        render(match.promptIdx);    // resets/restores cursor to (1,1) or remembered
      }
      // Translate the rendered-text offset to (line, col) in the now-current
      // rendered text and position the cursor there.
      const text = currentRenderedText();
      const lc = offsetToLineCol(text, match.offset);
      placeCursorAt(lc.line, lc.col);
    }

    function executeSearch(s) {
      if (!s) return;
      const match = findMatchGlobal(s, +1);
      if (match) { applyMatch(s, match); return; }
      // Not found — show error in the search bar.
      if (errorClearTimer) clearTimeout(errorClearTimer);
      setSearchBar('Pattern not found: ' + s, true);
      errorClearTimer = setTimeout(() => {
        setSearchBar('', false);
        errorClearTimer = null;
      }, 2000);
    }

    function jumpToMatch(direction) {
      if (!lastSearch) return;
      // Surface the previous search in the bar so the user sees what they're
      // cycling through with n / N.
      setSearchBar('/' + lastSearch, false);
      const match = findMatchGlobal(lastSearch, direction);
      if (match) { applyMatch(lastSearch, match); return; }
      if (errorClearTimer) clearTimeout(errorClearTimer);
      setSearchBar('Pattern not found: ' + lastSearch, true);
      errorClearTimer = setTimeout(() => {
        setSearchBar('', false);
        errorClearTimer = null;
      }, 2000);
    }
    // ---- end search --------------------------------------------------------

    function renderInlineInto(parent, text) {
      let i = 0;
      let buf = '';
      const flush = () => {
        if (buf) { parent.appendChild(document.createTextNode(buf)); buf = ''; }
      };
      while (i < text.length) {
        const ch = text[i];
        if (ch === '`') {
          const end = text.indexOf('`', i + 1);
          if (end > i) {
            flush();
            const codeText = text.slice(i + 1, end);
            const code = document.createElement('code');
            code.textContent = codeText;
            if (PLAN_PATH_RE.test(codeText)) {
              const a = document.createElement('a');
              a.href = 'vscode://file' + codeText;
              a.target = '_blank';
              a.rel = 'noopener noreferrer';
              a.className = 'plan-path';
              a.appendChild(code);
              parent.appendChild(a);
            } else {
              parent.appendChild(code);
            }
            i = end + 1;
            continue;
          }
        }
        if (ch === '[') {
          const closeBracket = text.indexOf(']', i + 1);
          if (closeBracket > i && text[closeBracket + 1] === '(') {
            const closeParen = text.indexOf(')', closeBracket + 2);
            if (closeParen > closeBracket) {
              const label = text.slice(i + 1, closeBracket);
              const url   = text.slice(closeBracket + 2, closeParen);
              if (ALLOWED_LINK_SCHEME.test(url)) {
                flush();
                const a = document.createElement('a');
                a.href = url;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                renderInlineInto(a, label);
                parent.appendChild(a);
                i = closeParen + 1;
                continue;
              }
            }
          }
        }
        if (ch === 'h' || ch === 'H') {
          const m = text.slice(i).match(/^https?:\/\/\S+/i);
          if (m) {
            flush();
            const a = document.createElement('a');
            a.href = m[0];
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.textContent = m[0];
            parent.appendChild(a);
            i += m[0].length;
            continue;
          }
        }
        if (ch === '*' && text[i + 1] === '*') {
          const end = text.indexOf('**', i + 2);
          if (end > i + 2) {
            flush();
            const strong = document.createElement('strong');
            renderInlineInto(strong, text.slice(i + 2, end));
            parent.appendChild(strong);
            i = end + 2;
            continue;
          }
        }
        if ((ch === '*' || ch === '_') && text[i + 1] !== ch) {
          const end = text.indexOf(ch, i + 1);
          if (end > i + 1) {
            flush();
            const em = document.createElement('em');
            renderInlineInto(em, text.slice(i + 1, end));
            parent.appendChild(em);
            i = end + 1;
            continue;
          }
        }
        buf += ch;
        i++;
      }
      flush();
    }
    // ---- end markdown renderer ----------------------------------------------

    function render(index) {
      if (!prompts.length) {
        setMessage('No prompts found in ~/.claude/projects/.', 'muted');
        return;
      }
      const clamped = Math.max(0, Math.min(prompts.length - 1, index));

      // Save the OLD prompt's cursor before swapping, so a return-trip via
      // arrow keys (or search) restores it.
      if (prompts.length && currentIndex !== clamped) {
        cursorByPromptIndex[currentIndex] = { line: cursor.line, col: cursor.col };
        persistCursor();
      }

      currentIndex = clamped;
      const p = prompts[clamped];

      // Prompt line: if the previous response ends with a `?`, prefix the
      // line with `Claude: <question> (User) ` ahead of the prompt; otherwise
      // the line is just `User: <prompt>`. The previous response is the
      // previous entry in the GLOBAL timeline (across session boundaries) —
      // that's intentional: the timeline is conceptually flat.
      const prev = clamped > 0 ? prompts[clamped - 1] : null;
      const question = prev ? extractTrailingQuestion(prev.response_text || '') : null;
      const userText = p.user_text || '';
      if (question) {
        buildPromptLine(
          formatDate(prev.timestamp),
          formatTime(prev.timestamp),
          ' Claude: ' + question + ' User: ' + userText
        );
      } else {
        buildPromptLine(
          formatDate(p.timestamp),
          formatTime(p.timestamp),
          ' User: ' + userText
        );
      }

      // Markdown-rendered response body
      responseBodyEl.replaceChildren();
      responseBodyEl.className = 'response-body';
      renderMarkdownInto(responseBodyEl, p.response_text || '(no response captured)');

      if (p.day) {
        lastIndexByDay[p.day] = clamped;
        persistDay();
      }

      const url = new URL(window.location.href);
      url.searchParams.set('prompt', String(clamped));
      window.history.replaceState(null, '', url.toString());

      // Restore the NEW prompt's cursor (or start at 1,1 if no memory).
      const remembered = cursorByPromptIndex[clamped];
      if (remembered) {
        cursor = { line: remembered.line, col: remembered.col };
      } else {
        cursor = { line: 1, col: 1 };
      }
      placeCursorAt(cursor.line, cursor.col);
    }

    function dayIndexOf(currentDay) {
      for (let i = 0; i < days.length; i++) {
        if (days[i].date === currentDay) return i;
      }
      return -1;
    }

    function targetForDay(day) {
      const remembered = lastIndexByDay[day.date];
      if (remembered != null
          && remembered >= day.first_prompt_index
          && remembered <= day.last_prompt_index) {
        return remembered;
      }
      return day.first_prompt_index;
    }

    function goToPrevDay() {
      if (!prompts.length || !days.length) return;
      const di = dayIndexOf(prompts[currentIndex].day);
      if (di > 0) {
        render(targetForDay(days[di - 1]));
      } else if (di === -1 && days.length) {
        render(targetForDay(days[0]));
      }
    }

    function goToNextDay() {
      if (!prompts.length || !days.length) return;
      const di = dayIndexOf(prompts[currentIndex].day);
      if (di >= 0 && di < days.length - 1) {
        render(targetForDay(days[di + 1]));
      }
    }

    document.addEventListener('keydown', (event) => {
      // Don't hijack browser shortcuts (Cmd-R, Ctrl-C, etc.).
      if (event.metaKey || event.ctrlKey || event.altKey) return;

      const key = event.key;

      // Modifier-only keydowns (Shift before `G` is the common case) must not
      // fall through to the "any other key clears numberPrefix" branch below
      // — otherwise typing `1G` clears the accumulator on the Shift event and
      // `G` then jumps to the last line instead of line 1.
      if (key === 'Shift' || key === 'Control' || key === 'Alt' ||
          key === 'Meta' || key === 'CapsLock') return;

      // Arrow keys preserve their existing behavior in BOTH normal mode AND
      // search mode (user can still browse prompts/days while a search box is
      // open — keeping symmetric with the existing behavior).
      if (key === 'ArrowUp')    { event.preventDefault(); render(currentIndex - 1); return; }
      if (key === 'ArrowDown')  { event.preventDefault(); render(currentIndex + 1); return; }
      if (key === 'ArrowLeft')  { event.preventDefault(); goToPrevDay(); return; }
      if (key === 'ArrowRight') { event.preventDefault(); goToNextDay(); return; }

      // Search mode: all printable keys are captured into the search string.
      if (searchMode) { handleSearchKey(event); return; }

      // Escape (in normal mode) hides the search bar — symmetric with the
      // in-search-mode Escape that cancels typing. Also clears any pending
      // number prefix.
      if (key === 'Escape') {
        event.preventDefault();
        if (errorClearTimer) { clearTimeout(errorClearTimer); errorClearTimer = null; }
        setSearchBar('', false);
        numberPrefix = '';
        return;
      }

      // Number-prefix accumulator for <num>G.
      if (key.length === 1 && key >= '0' && key <= '9') {
        numberPrefix += key;
        event.preventDefault();
        return;
      }

      if (key === 'h') { event.preventDefault(); moveCursor(0, -1); numberPrefix = ''; }
      else if (key === 'l') { event.preventDefault(); moveCursor(0, +1); numberPrefix = ''; }
      else if (key === 'j') { event.preventDefault(); moveCursor(+1, 0); numberPrefix = ''; }
      else if (key === 'k') { event.preventDefault(); moveCursor(-1, 0); numberPrefix = ''; }
      else if (key === 'H' || key === 'M' || key === 'L') {
        event.preventDefault();
        numberPrefix = '';
        const range = findVisibleLineRange();
        if (range) {
          const target = key === 'H' ? range.top : key === 'M' ? range.mid : range.bot;
          moveCursorAbs(target, 1);
        }
      }
      else if (key === 'G') {
        event.preventDefault();
        const target = numberPrefix === '' ? totalLines() : parseInt(numberPrefix, 10);
        numberPrefix = '';
        moveCursorAbs(target, 1);
      } else if (key === '/') {
        event.preventDefault();
        numberPrefix = '';
        enterSearchMode();
      } else if (key === 'n') {
        event.preventDefault();
        numberPrefix = '';
        jumpToMatch(+1);
      } else if (key === 'N') {
        event.preventDefault();
        numberPrefix = '';
        jumpToMatch(-1);
      } else {
        // Any other key clears the digit accumulator.
        numberPrefix = '';
      }
    });

    (async function load() {
      try {
        const res = await fetch(BACKEND_URL + '/claudecode/timeline');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        prompts = Array.isArray(data.prompts) ? data.prompts : [];
        days = Array.isArray(data.days) ? data.days : [];
        hydrateMemory();
        const urlParams = new URLSearchParams(window.location.search);
        const requested = parseInt(urlParams.get('prompt') || '', 10);
        const lastDayFirst = days.length ? days[days.length - 1].first_prompt_index : 0;
        const startIndex = Number.isFinite(requested) ? requested : lastDayFirst;
        render(startIndex);
      } catch (err) {
        const msg = err && err.message ? err.message : String(err);
        if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) {
          setMessage('Backend unreachable at ' + BACKEND_URL + ' — start the local server (see api/server/README.md).', 'error');
        } else {
          setMessage(msg, 'error');
        }
      }
    })();
  </script>
</body>
</html>
