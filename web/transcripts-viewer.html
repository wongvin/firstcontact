<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Code Transcript Viewer</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 1rem;
      box-sizing: border-box;
      gap: 0.75rem;
    }
    a.home-link {
      position: fixed;
      top: 1rem;
      left: 1rem;
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      font-size: 0.9rem;
      padding: 0.4rem 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 0.4rem;
      background: rgba(255, 255, 255, 0.08);
      z-index: 10;
    }
    a.home-link:hover { color: white; }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 3.5rem;
      min-height: 0;
    }
    .output-card {
      flex: 1;
      min-height: 0;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 0.75rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 0.75rem 1rem;
      overflow-y: auto;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .prompt-line {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: pre-wrap;
      margin-bottom: 0.5rem;
      background: rgba(255, 255, 255, 0.88);
      color: #1a1a2e;
      font-weight: 700;
      padding: 0.4rem 0.7rem;
      border-radius: 0.4rem;
    }
    .response-body { white-space: pre-wrap; font-weight: 300; }
    .response-body > :first-child { margin-top: 0.5rem; }
    .response-body p { margin: 0.5rem 0; white-space: pre-wrap; }
    .response-body h1,
    .response-body h2,
    .response-body h3,
    .response-body h4,
    .response-body h5,
    .response-body h6 { margin: 0.6rem 0 0.3rem; font-weight: 700; }
    .response-body ul,
    .response-body ol { padding-left: 1.25rem; margin: 0.25rem 0; }
    .response-body li { margin: 0.1rem 0; }
    .response-body pre {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
      overflow-x: auto;
      margin: 0.5rem 0;
      white-space: pre;
      font-size: 0.9rem;
    }
    .response-body code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.9rem;
      font-weight: 700;
    }
    .response-body pre code { font-family: inherit; font-size: inherit; }
    .response-body a {
      color: #cfe0ff;
      background: rgba(0, 0, 0, 0.32);
      border-radius: 4px;
      padding: 0.05rem 0.3rem;
      text-decoration: underline;
      text-decoration-color: rgba(207, 224, 255, 0.5);
    }
    .response-body a:hover {
      background: rgba(0, 0, 0, 0.5);
      text-decoration-color: #cfe0ff;
    }
    .response-body a.plan-path { text-decoration: none; }
    .response-body a.plan-path code { color: inherit; }
    .response-body a.plan-path:hover code { color: #ffffff; }
    .response-body strong { font-weight: 700; }
    .response-body table {
      border-collapse: collapse;
      margin: 0.5rem 0;
      font-size: 0.85rem;
    }
    .response-body th,
    .response-body td {
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 0.3rem 0.6rem;
      text-align: left;
      vertical-align: top;
    }
    .response-body th {
      background: rgba(255, 255, 255, 0.08);
      font-weight: 600;
    }
    .help {
      text-align: center;
      font-size: 0.8rem;
      opacity: 0.7;
      letter-spacing: 0.04em;
    }
    .muted { opacity: 0.75; font-size: 0.95rem; }
    .error { color: #ffd6d6; }
  </style>
</head>
<body>
  <a class="home-link" href="index.html">← Home</a>

  <main>
    <article class="output-card" id="output-card" aria-live="polite">
      <div class="prompt-line" id="prompt-line"></div>
      <div class="response-body" id="response-body">Loading…</div>
    </article>
    <div class="help">↑↓ prompts &nbsp;·&nbsp; ←→ days</div>
  </main>

  <script>
    const BACKEND_URL = "http://localhost:8000";
    const ALLOWED_LINK_SCHEME = /^(https?:|mailto:)/i;
    // Plan-file detection inside inline `code` spans: any absolute path under
    // `<home>/.claude/plans/<name>.md` becomes a clickable vscode://file/<path>
    // link so the user can open the plan in VS Code. Scoped narrowly to plan
    // files only — other inline code (filenames in general, identifiers, etc.)
    // stays as plain <code>. Optional trailing `:LINE` or `:LINE:COL` accepted.
    const PLAN_PATH_RE = /^\/.+\/\.claude\/plans\/[\w.-]+\.md(?::\d+(?::\d+)?)?$/;

    const promptLineEl   = document.getElementById('prompt-line');
    const responseBodyEl = document.getElementById('response-body');

    let prompts = [];
    let days = [];
    let currentIndex = 0;
    const lastIndexByDay = {};  // remembers last viewed prompt index within each day

    function setMessage(text, className) {
      responseBodyEl.replaceChildren();
      responseBodyEl.textContent = text;
      responseBodyEl.className = 'response-body' + (className ? ' ' + className : '');
      promptLineEl.replaceChildren();
    }

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return iso;
      const pad = (n) => String(n).padStart(2, '0');
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
    }

    function formatTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '';
      const pad = (n) => String(n).padStart(2, '0');
      let h = d.getHours();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return pad(h) + ':' + pad(d.getMinutes()) + ' ' + ampm;
    }

    // Builds the prompt-line content as DOM nodes so the time portion can carry
    // its own background tint via a <span class="time-chip">. Everything else
    // is plain text via createTextNode — no markdown rendering on prompt content.
    function buildPromptLine(dateStr, timeStr, suffix) {
      promptLineEl.replaceChildren();
      promptLineEl.appendChild(document.createTextNode(dateStr + ' '));
      const chip = document.createElement('span');
      chip.className = 'time-chip';
      chip.textContent = timeStr;
      promptLineEl.appendChild(chip);
      promptLineEl.appendChild(document.createTextNode(suffix));
    }

    // Walks back from a trailing `?` to the previous sentence terminator
    // (`.`, `!`, `?`, or `\n`) and returns just that fragment. Used to surface
    // the Claude question that prompted the current user reply.
    function extractTrailingQuestion(text) {
      if (!text) return null;
      const trimmed = text.replace(/\s+$/, '');
      if (!trimmed.endsWith('?')) return null;
      let start = 0;
      for (let i = trimmed.length - 2; i >= 0; i--) {
        const c = trimmed[i];
        if (c === '.' || c === '!' || c === '?' || c === '\n') { start = i + 1; break; }
      }
      return trimmed.slice(start).trimStart();
    }

    // ---- Markdown renderer ---------------------------------------------------
    // Hand-rolled to honour web/CLAUDE.md: no external dependencies, no
    // `innerHTML` on API strings. All DOM is built via createElement +
    // textContent. The only attribute set from API data is anchor `href`,
    // and only after scheme validation against ALLOWED_LINK_SCHEME.
    //
    // In scope: fenced code, inline code, links, bare URLs, headings,
    // unordered/ordered lists (flat), **bold**, *italic*, _italic_,
    // GFM tables (`| h | h |` + `|---|---|` separator + body rows).
    // Out of scope: nested lists, block quotes, horizontal rules,
    // images, strikethrough, reference links, inline HTML.

    function renderMarkdownInto(root, mdText) {
      if (!mdText) return;
      const blocks = parseBlocks(mdText);
      for (const block of blocks) renderBlock(root, block);
    }

    function parseBlocks(text) {
      const lines = text.split('\n');
      const blocks = [];
      let i = 0;
      while (i < lines.length) {
        const line = lines[i];
        const fence = line.match(/^```(\w*)\s*$/);
        if (fence) {
          const bodyLines = [];
          i++;
          while (i < lines.length && !/^```\s*$/.test(lines[i])) {
            bodyLines.push(lines[i]);
            i++;
          }
          i++;  // skip closing fence (or EOF)
          blocks.push({ type: 'code', body: bodyLines.join('\n') });
          continue;
        }
        if (line.trim() === '') { i++; continue; }
        const heading = line.match(/^(#{1,6})\s+(.*)$/);
        if (heading) {
          blocks.push({ type: 'heading', level: heading[1].length, text: heading[2] });
          i++;
          continue;
        }
        // GFM table: header `| col | col |`, then separator `|---|---|`
        // (cells may contain `:` for alignment, which we accept but ignore),
        // then body rows. Recognised only when the line *after* a pipe header
        // is a valid separator — otherwise the line is a paragraph.
        if (line.includes('|') && i + 1 < lines.length && isTableSeparator(lines[i + 1])) {
          const header = parseTableRow(line);
          i += 2;  // skip header + separator
          const rows = [];
          while (i < lines.length && lines[i].includes('|') && lines[i].trim() !== '') {
            rows.push(parseTableRow(lines[i]));
            i++;
          }
          blocks.push({ type: 'table', header, rows });
          continue;
        }
        const ul = /^[-*]\s+(.*)$/;
        const ol = /^\d+\.\s+(.*)$/;
        if (ul.test(line) || ol.test(line)) {
          const re = ul.test(line) ? ul : ol;
          const items = [];
          while (i < lines.length && re.test(lines[i])) {
            items.push(lines[i].match(re)[1]);
            i++;
          }
          blocks.push({ type: re === ul ? 'ul' : 'ol', items });
          continue;
        }
        const paraLines = [];
        while (i < lines.length && lines[i].trim() !== '' &&
               !/^```/.test(lines[i]) &&
               !/^#{1,6}\s/.test(lines[i]) &&
               !ul.test(lines[i]) && !ol.test(lines[i]) &&
               !(lines[i].includes('|') && i + 1 < lines.length && isTableSeparator(lines[i + 1]))) {
          paraLines.push(lines[i]);
          i++;
        }
        if (paraLines.length) blocks.push({ type: 'p', text: paraLines.join('\n') });
      }
      return blocks;
    }

    function isTableSeparator(line) {
      // Strip leading/trailing pipes + whitespace, split on `|`, each cell must
      // match `-+`, optionally bracketed by `:` (alignment), nothing else.
      const trimmed = line.trim();
      if (!trimmed.includes('|') || !trimmed.includes('-')) return false;
      const inner = trimmed.replace(/^\|/, '').replace(/\|$/, '');
      const cells = inner.split('|');
      if (cells.length === 0) return false;
      return cells.every(c => /^\s*:?-+:?\s*$/.test(c));
    }

    function parseTableRow(line) {
      const trimmed = line.trim().replace(/^\|/, '').replace(/\|$/, '');
      return trimmed.split('|').map(c => c.trim());
    }

    function renderBlock(parent, block) {
      if (block.type === 'code') {
        const pre = document.createElement('pre');
        const code = document.createElement('code');
        code.textContent = block.body;
        pre.appendChild(code);
        parent.appendChild(pre);
        return;
      }
      if (block.type === 'heading') {
        const h = document.createElement('h' + block.level);
        renderInlineInto(h, block.text);
        parent.appendChild(h);
        return;
      }
      if (block.type === 'ul' || block.type === 'ol') {
        const list = document.createElement(block.type);
        for (const item of block.items) {
          const li = document.createElement('li');
          renderInlineInto(li, item);
          list.appendChild(li);
        }
        parent.appendChild(list);
        return;
      }
      if (block.type === 'table') {
        const table = document.createElement('table');
        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');
        for (const cell of block.header) {
          const th = document.createElement('th');
          renderInlineInto(th, cell);
          headerRow.appendChild(th);
        }
        thead.appendChild(headerRow);
        table.appendChild(thead);
        const tbody = document.createElement('tbody');
        for (const row of block.rows) {
          const tr = document.createElement('tr');
          for (const cell of row) {
            const td = document.createElement('td');
            renderInlineInto(td, cell);
            tr.appendChild(td);
          }
          tbody.appendChild(tr);
        }
        table.appendChild(tbody);
        parent.appendChild(table);
        return;
      }
      if (block.type === 'p') {
        const p = document.createElement('p');
        renderInlineInto(p, block.text);
        parent.appendChild(p);
      }
    }

    function renderInlineInto(parent, text) {
      let i = 0;
      let buf = '';
      const flush = () => {
        if (buf) { parent.appendChild(document.createTextNode(buf)); buf = ''; }
      };
      while (i < text.length) {
        const ch = text[i];
        if (ch === '`') {
          const end = text.indexOf('`', i + 1);
          if (end > i) {
            flush();
            const codeText = text.slice(i + 1, end);
            const code = document.createElement('code');
            code.textContent = codeText;
            if (PLAN_PATH_RE.test(codeText)) {
              const a = document.createElement('a');
              a.href = 'vscode://file' + codeText;
              a.target = '_blank';
              a.rel = 'noopener noreferrer';
              a.className = 'plan-path';
              a.appendChild(code);
              parent.appendChild(a);
            } else {
              parent.appendChild(code);
            }
            i = end + 1;
            continue;
          }
        }
        if (ch === '[') {
          const closeBracket = text.indexOf(']', i + 1);
          if (closeBracket > i && text[closeBracket + 1] === '(') {
            const closeParen = text.indexOf(')', closeBracket + 2);
            if (closeParen > closeBracket) {
              const label = text.slice(i + 1, closeBracket);
              const url   = text.slice(closeBracket + 2, closeParen);
              if (ALLOWED_LINK_SCHEME.test(url)) {
                flush();
                const a = document.createElement('a');
                a.href = url;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                renderInlineInto(a, label);
                parent.appendChild(a);
                i = closeParen + 1;
                continue;
              }
            }
          }
        }
        if (ch === 'h' || ch === 'H') {
          const m = text.slice(i).match(/^https?:\/\/\S+/i);
          if (m) {
            flush();
            const a = document.createElement('a');
            a.href = m[0];
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.textContent = m[0];
            parent.appendChild(a);
            i += m[0].length;
            continue;
          }
        }
        if (ch === '*' && text[i + 1] === '*') {
          const end = text.indexOf('**', i + 2);
          if (end > i + 2) {
            flush();
            const strong = document.createElement('strong');
            renderInlineInto(strong, text.slice(i + 2, end));
            parent.appendChild(strong);
            i = end + 2;
            continue;
          }
        }
        if ((ch === '*' || ch === '_') && text[i + 1] !== ch) {
          const end = text.indexOf(ch, i + 1);
          if (end > i + 1) {
            flush();
            const em = document.createElement('em');
            renderInlineInto(em, text.slice(i + 1, end));
            parent.appendChild(em);
            i = end + 1;
            continue;
          }
        }
        buf += ch;
        i++;
      }
      flush();
    }
    // ---- end markdown renderer ----------------------------------------------

    function render(index) {
      if (!prompts.length) {
        setMessage('No prompts found in ~/.claude/projects/.', 'muted');
        return;
      }
      const clamped = Math.max(0, Math.min(prompts.length - 1, index));
      currentIndex = clamped;
      const p = prompts[clamped];

      // Prompt line: if the previous response ends with a `?`, prefix the
      // line with `Claude: <question> (User) ` ahead of the prompt; otherwise
      // the line is just `User: <prompt>`. The previous response is the
      // previous entry in the GLOBAL timeline (across session boundaries) —
      // that's intentional: the timeline is conceptually flat.
      const prev = clamped > 0 ? prompts[clamped - 1] : null;
      const question = prev ? extractTrailingQuestion(prev.response_text || '') : null;
      const userText = p.user_text || '';
      if (question) {
        buildPromptLine(
          formatDate(prev.timestamp),
          formatTime(prev.timestamp),
          ' Claude: ' + question + ' User: ' + userText
        );
      } else {
        buildPromptLine(
          formatDate(p.timestamp),
          formatTime(p.timestamp),
          ' User: ' + userText
        );
      }

      // Markdown-rendered response body
      responseBodyEl.replaceChildren();
      responseBodyEl.className = 'response-body';
      renderMarkdownInto(responseBodyEl, p.response_text || '(no response captured)');

      if (p.day) lastIndexByDay[p.day] = clamped;

      const url = new URL(window.location.href);
      url.searchParams.set('prompt', String(clamped));
      window.history.replaceState(null, '', url.toString());
    }

    function dayIndexOf(currentDay) {
      for (let i = 0; i < days.length; i++) {
        if (days[i].date === currentDay) return i;
      }
      return -1;
    }

    function targetForDay(day) {
      const remembered = lastIndexByDay[day.date];
      if (remembered != null
          && remembered >= day.first_prompt_index
          && remembered <= day.last_prompt_index) {
        return remembered;
      }
      return day.first_prompt_index;
    }

    function goToPrevDay() {
      if (!prompts.length || !days.length) return;
      const di = dayIndexOf(prompts[currentIndex].day);
      if (di > 0) {
        render(targetForDay(days[di - 1]));
      } else if (di === -1 && days.length) {
        render(targetForDay(days[0]));
      }
    }

    function goToNextDay() {
      if (!prompts.length || !days.length) return;
      const di = dayIndexOf(prompts[currentIndex].day);
      if (di >= 0 && di < days.length - 1) {
        render(targetForDay(days[di + 1]));
      }
    }

    document.addEventListener('keydown', (event) => {
      const key = event.key;
      if (key === 'ArrowUp') {
        event.preventDefault();
        render(currentIndex - 1);
      } else if (key === 'ArrowDown') {
        event.preventDefault();
        render(currentIndex + 1);
      } else if (key === 'ArrowLeft') {
        event.preventDefault();
        goToPrevDay();
      } else if (key === 'ArrowRight') {
        event.preventDefault();
        goToNextDay();
      }
    });

    (async function load() {
      try {
        const res = await fetch(BACKEND_URL + '/claudecode/timeline');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        prompts = Array.isArray(data.prompts) ? data.prompts : [];
        days = Array.isArray(data.days) ? data.days : [];
        const urlParams = new URLSearchParams(window.location.search);
        const requested = parseInt(urlParams.get('prompt') || '', 10);
        const startIndex = Number.isFinite(requested)
          ? requested
          : Math.max(0, prompts.length - 1);
        render(startIndex);
      } catch (err) {
        const msg = err && err.message ? err.message : String(err);
        if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) {
          setMessage('Backend unreachable at ' + BACKEND_URL + ' — start the local server (see api/server/README.md).', 'error');
        } else {
          setMessage(msg, 'error');
        }
      }
    })();
  </script>
</body>
</html>
